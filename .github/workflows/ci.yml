name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4]
        laravel: [11.*, 12.*, 13.*]
        exclude:
          - php: 8.4
            laravel: 10.*

    name: PHP ${{ matrix.php }} - L${{ matrix.laravel }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: 📦 Install dependencies
        run: |
          composer update --with="illuminate/support:${{ matrix.laravel }}" --prefer-dist --no-interaction --no-progress

      - name: 🧪 Run tests
        run: vendor/bin/pest --ci

      - name: 🔍 Run PHPStan (report only)
        run: vendor/bin/phpstan analyse src --level=5 --memory-limit=1G || true
